<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download File</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --surface2: #141820;
    --border: rgba(255,255,255,0.06);
    --accent: #e63946;
    --accent2: #ff6b6b;
    --text: #f0f0f0;
    --muted: #6b7280;
    --glow: rgba(230, 57, 70, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(230,57,70,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 100%, rgba(230,57,70,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.03);
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Top accent strip */
  .card-top {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }

  .card-body {
    padding: 32px;
  }

  /* Icon */
  .icon-wrap {
    width: 64px;
    height: 64px;
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
    animation: rise 0.7s ease 0.1s both;
  }

  .icon-wrap::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(230,57,70,0.3), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  .icon-wrap svg {
    width: 28px;
    height: 28px;
    color: var(--accent);
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
  }

  /* Title */
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 6px;
    animation: rise 0.7s ease 0.15s both;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    animation: rise 0.7s ease 0.2s both;
  }

  /* File details */
  .file-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: rise 0.7s ease 0.25s both;
  }

  .file-icon {
    width: 42px;
    height: 42px;
    background: rgba(230,57,70,0.08);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .file-icon svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: var(--accent2);
    stroke-width: 1.5;
  }

  .file-details { flex: 1; min-width: 0; }

  .file-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .file-size {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .secure-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: 6px;
    padding: 4px 8px;
    flex-shrink: 0;
  }

  .secure-badge svg {
    width: 11px;
    height: 11px;
    fill: none;
    stroke: #4ade80;
    stroke-width: 2;
  }

  .secure-badge span {
    font-size: 10px;
    color: #4ade80;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Download button */
  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.25s ease;
    box-shadow: 0 8px 30px var(--glow);
    position: relative;
    overflow: hidden;
    animation: rise 0.7s ease 0.3s both;
  }

  .download-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .download-btn:hover {
    background: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px var(--glow);
  }

  .download-btn:hover::before { opacity: 1; }

  .download-btn:active { transform: translateY(0); }

  .download-btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    animation: bounce 2s ease infinite;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    animation: rise 0.7s ease 0.35s both;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Features */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    animation: rise 0.7s ease 0.4s both;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .feature svg {
    width: 13px;
    height: 13px;
    fill: none;
    stroke: var(--accent2);
    stroke-width: 2;
    flex-shrink: 0;
  }

  .feature span {
    font-size: 11px;
    color: var(--muted);
  }

  /* Footer */
  .card-footer {
    padding: 16px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: rise 0.7s ease 0.45s both;
  }

  .card-footer span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .card-footer strong {
    color: var(--accent2);
    font-weight: 600;
  }

  /* Animations */
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(3px); }
  }

  /* Mobile */
  @media (max-width: 480px) {
    .card-body { padding: 24px; }
    .features { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<div class="card">
  <div class="card-top"></div>
  <div class="card-body">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    </div>

    <div class="title">Your File</div>
    <div class="subtitle">Ready to download — secured &amp; delivered instantly</div>

    <div class="file-card">
      <div class="file-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="file-details">
        <div class="file-name">Secure File</div>
        <div class="file-size">Served via Telegram CDN</div>
      </div>
      <div class="secure-badge">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Safe</span>
      </div>
    </div>

    <a href="{{ file_url }}" class="download-btn" download>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Download Now
    </a>

    <div class="divider"><span>Includes</span></div>

    <div class="features">
      <div class="feature">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Fast delivery</span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Secure transfer</span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>No expiry</span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.22 1.18 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        <span>Direct link</span>
      </div>
    </div>

  </div>
  <div class="card-footer">
    <span>Powered by <strong>StreamVault Bot</strong> &nbsp;·&nbsp; Telegram File CDN</span>
  </div>
</div>

</body>
</html>
